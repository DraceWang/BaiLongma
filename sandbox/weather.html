<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陆丰实时天气</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .weather-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .location {
            font-size: 28px;
            font-weight: 700;
            color: #1a202c;
            margin-bottom: 8px;
        }
        .datetime {
            font-size: 14px;
            color: #718096;
            margin-bottom: 30px;
        }
        .weather-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .temperature {
            font-size: 72px;
            font-weight: 200;
            color: #2d3748;
            margin-bottom: 10px;
        }
        .condition {
            font-size: 20px;
            color: #4a5568;
            margin-bottom: 30px;
            text-transform: capitalize;
        }
        .details {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        .detail-item {
            padding: 15px;
            background: #f7fafc;
            border-radius: 12px;
        }
        .detail-label {
            font-size: 12px;
            color: #718096;
            margin-bottom: 5px;
        }
        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: #2d3748;
        }
        .loading {
            display: none;
            font-size: 18px;
            color: #718096;
        }
        .error {
            display: none;
            color: #e53e3e;
            padding: 20px;
        }
        .refresh-btn {
            margin-top: 25px;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .last-updated {
            margin-top: 15px;
            font-size: 12px;
            color: #a0aec0;
        }
    </style>
</head>
<body>
    <div class="weather-card">
        <div class="location">📍 陆丰</div>
        <div class="datetime" id="datetime"></div>
        
        <div class="loading" id="loading">正在加载天气数据...</div>
        <div class="error" id="error"></div>
        
        <div id="weather-content">
            <div class="weather-icon" id="weather-icon">☀️</div>
            <div class="temperature" id="temperature">--°C</div>
            <div class="condition" id="condition">--</div>
            
            <div class="details">
                <div class="detail-item">
                    <div class="detail-label">💧 湿度</div>
                    <div class="detail-value" id="humidity">--%</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">💨 风速</div>
                    <div class="detail-value" id="wind">--km/h</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">🌡️ 体感</div>
                    <div class="detail-value" id="feelslike">--°C</div>
                </div>
            </div>
            
            <button class="refresh-btn" onclick="fetchWeather()">🔄 刷新天气</button>
            <div class="last-updated" id="last-updated"></div>
        </div>
    </div>

    <script>
        const weatherIcons = {
            'Sunny': '☀️',
            'Clear': '🌙',
            'Partly Cloudy': '⛅',
            'Cloudy': '☁️',
            'Overcast': '☁️',
            'Mist': '🌫️',
            'Fog': '🌫️',
            'Rain': '🌧️',
            'Light Rain': '🌦️',
            'Heavy Rain': '🌧️',
            'Snow': '❄️',
            'Thunderstorm': '⛈️',
            'default': '🌤️'
        };

        function getWeatherIcon(condition) {
            for (const key in weatherIcons) {
                if (condition.toLowerCase().includes(key.toLowerCase())) {
                    return weatherIcons[key];
                }
            }
            return weatherIcons['default'];
        }

        function updateDateTime() {
            const now = new Date();
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long',
                hour: '2-digit', 
                minute: '2-digit'
            };
            document.getElementById('datetime').textContent = now.toLocaleDateString('zh-CN', options);
        }

        async function fetchWeather() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const content = document.getElementById('weather-content');
            
            loading.style.display = 'block';
            error.style.display = 'none';
            content.style.display = 'none';

            try {
                const response = await fetch('https://wttr.in/Lufeng?format=j1&lang=zh');
                const data = await response.json();
                
                const current = data.current_condition[0];
                
                document.getElementById('weather-icon').textContent = getWeatherIcon(current.lang_zh[0].value);
                document.getElementById('temperature').textContent = current.temp_C + '°C';
                document.getElementById('condition').textContent = current.lang_zh[0].value;
                document.getElementById('humidity').textContent = current.humidity + '%';
                document.getElementById('wind').textContent = current.windspeedKmph + ' km/h';
                document.getElementById('feelslike').textContent = current.FeelsLikeC + '°C';
                
                const now = new Date();
                document.getElementById('last-updated').textContent = '最后更新: ' + now.toLocaleTimeString('zh-CN');
                
                loading.style.display = 'none';
                content.style.display = 'block';
                updateDateTime();
                
            } catch (err) {
                loading.style.display = 'none';
                error.style.display = 'block';
                error.textContent = '获取天气失败，请检查网络连接后重试';
            }
        }

        // 页面加载时自动获取天气
        fetchWeather();
    </script>
</body>
</html>
